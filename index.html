<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木蘭的英雄之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f3e5d8; /* 紙張質感背景色 */
            overflow-x: hidden; /* 防止特效超出畫面邊界造成水平卷軸閃動 */
        }

        /* 地圖容器，保持比例 */
        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border: 8px solid #5d4037;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            overflow: hidden;
            background-color: #eaddcf;
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none; /* 讓點擊穿透圖片 */
        }

        /* 地點標記點 */
        .location-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: rgba(185, 28, 28, 0.6);
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
        }

        /* 使用虛擬元素與 transform 來做動畫，效能更好且不會閃爍 */
        .location-dot::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            border: 2px solid rgba(185, 28, 28, 0.8);
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        .location-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
            color: #4a3b32;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .location-dot:hover .location-label {
            opacity: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* 木蘭角色標記 */
        #hero-token {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 40px;
            text-align: center;
            line-height: 60px;
            transform: translate(-50%, -60%) translateZ(0); /* 加入 translateZ(0) 啟用硬體加速 */
            z-index: 20;
            transition: left 1.5s ease-in-out, top 1.5s ease-in-out; /* 避免使用 all，防止 Emoji 替換時閃爍 */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            will-change: left, top; /* 提示瀏覽器優化 */
        }

        /* 對話框樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fffbf0;
            background-image: linear-gradient(#e8e0d5 1px, transparent 1px), linear-gradient(90deg, #e8e0d5 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 4px double #8b5a2b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #f5f5f5;
            border: 2px solid #d4c5b0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            color: #444;
        }

        .option-btn:hover {
            background-color: #e6dccf;
            border-color: #8b5a2b;
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: #059669;
            color: #065f46;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: #dc2626;
            color: #991b1b;
        }
        
        /* 勝利畫面特效 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* 新增的樣式：愛心與解說區 */
        .heart-icon {
            transition: all 0.3s ease;
        }
        .heart-lost {
            filter: grayscale(100%);
            opacity: 0.3;
            transform: scale(0.8);
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

    <script>
        // --- 音效系統 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                // 答對音效：清脆的叮咚聲
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // A5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                // 答錯音效：低沉的嗶聲
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- 遊戲狀態 ---
        let currentStep = 0;
        let currentQuestionIndex = 0; // 0 代表第一題, 1 代表第二題
        let lives = 3;

        // --- DOM 元素 ---
        const mapContainer = document.getElementById('map-container');
        const heroToken = document.getElementById('hero-token');
        const locationsLayer = document.getElementById('locations-layer');
        const quizModal = document.getElementById('quiz-modal');
        const endModal = document.getElementById('end-modal');
        const startModal = document.getElementById('start-modal');
        const gameOverModal = document.getElementById('game-over-modal');
        const locationNameDisplay = document.getElementById('current-location-name');
        
        // 影片、音樂與 UI 更新元素
        const bgMusic = document.getElementById('bg-music');
        const musicToggleBtn = document.getElementById('music-toggle-btn');
        let isMusicPlaying = false;
        
        const videoOverlay = document.getElementById('video-overlay');
        const introVideo = document.getElementById('intro-video');
        const playVideoBtnOverlay = document.getElementById('play-video-btn-overlay');

        const heartsContainer = document.getElementById('hearts-container');
        const feedbackArea = document.getElementById('feedback-area');
        const nextActionBtn = document.getElementById('next-action-btn');

        // --- 初始化 ---
        function initGame() {
            renderLocations();
            updateHeartsUI();
            updateHeroPosition(0, true); // true 代表初始靜默放置，不觸發題目
            
            // 顯示影片並嘗試自動播放
            videoOverlay.classList.add('active');
            startModal.classList.remove('active');
            
            const playPromise = introVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    console.log("自動播放影片被瀏覽器阻擋", err);
                    playVideoBtnOverlay.classList.remove('hidden');
                });
            }
            
            // 監聽影片播放與結束事件
            introVideo.onplay = () => playVideoBtnOverlay.classList.add('hidden');
            introVideo.onended = () => showStartModal();
        }

        // 手動觸發影片播放
        function playIntroVideo() {
            playVideoBtnOverlay.classList.add('hidden');
            introVideo.play();
        }

        // 跳過影片或影片結束後觸發，顯示開始旅程按鈕
        function skipVideo() {
            introVideo.pause();
            showStartModal();
        }

        // 顯示開始旅程按鈕的 Modal
        function showStartModal() {
            videoOverlay.classList.remove('active');
            startModal.classList.add('active');
        }

        // 開始旅程按鈕觸發
        function startGameFlow() {
            // 喚醒 AudioContext，符合瀏覽器的音訊播放規定
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            startModal.classList.remove('active');
            
            // 播放背景音樂
            bgMusic.volume = 0.4; // 設定背景音量，避免太吵蓋過答題特效音
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicToggleBtn.innerText = "🎵";
            }).catch(err => {
                console.log("自動播放音樂被瀏覽器阻擋", err);
            });

            // 開始問答第一關
            setTimeout(() => {
                showQuestion(0, 0);
            }, 500);
        }

        // 更新生命值 UI
        function updateHeartsUI() {
            const hearts = heartsContainer.querySelectorAll('.heart-icon');
            hearts.forEach((heart, index) => {
                if (index < lives) {
                    heart.classList.remove('heart-lost');
                } else {
                    heart.classList.add('heart-lost');
                }
            });
        }

        // 繪製地圖上的點
        function renderLocations() {
            locationsLayer.innerHTML = '';
            locations.forEach((loc, index) => {
                const dot = document.createElement('div');
                dot.className = 'location-dot';
                dot.style.left = loc.x + '%';
                dot.style.top = loc.y + '%';
                
                const label = document.createElement('div');
                label.className = 'location-label';
                label.innerText = loc.name;
                dot.appendChild(label);
                locationsLayer.appendChild(dot);
            });
        }

        // 更新主角位置
        function updateHeroPosition(stepIndex, isInit = false) {
            const loc = locations[stepIndex];
            heroToken.style.left = loc.x + '%';
            heroToken.style.top = loc.y + '%';
            
            if (stepIndex === 0) heroToken.innerText = "👧"; 
            else if (stepIndex >= 1 && stepIndex <= 3) heroToken.innerText = "🏇"; 
            else if (stepIndex === 4) heroToken.innerText = "🙇"; 
            else if (stepIndex === 5) heroToken.innerText = "🐫"; 

            locationNameDisplay.innerText = loc.name;

            if (!isInit) {
                // 移動動畫結束後觸發事件
                if (stepIndex > 0 && stepIndex <= locations.length - 1) {
                    setTimeout(() => {
                        showQuestion(stepIndex, 0); // 抵達新地點，顯示第一題
                    }, 1600); 
                }
            }
        }

        // 顯示題目
        function showQuestion(stepIdx, qIdx) {
            currentStep = stepIdx;
            currentQuestionIndex = qIdx;
            
            const qData = locations[stepIdx].questions[qIdx];
            if (!qData) return;

            document.getElementById('quiz-title').innerText = `關卡：${locations[stepIdx].name}`;
            document.getElementById('quiz-progress').innerText = `第 ${qIdx + 1} / 2 題`;
            document.getElementById('quiz-question').innerText = qData.text;
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            // 隱藏解說區
            feedbackArea.classList.add('hidden');

            qData.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, qData.correct, qData.explanation, btn);
                optionsDiv.appendChild(btn);
            });

            quizModal.classList.add('active');
        }

        // 檢查答案
        function checkAnswer(selected, correct, explanation, btnElement) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                b.style.pointerEvents = 'none'; // 停用 hover 效果，防止再次點擊
            });

            const feedbackMsg = document.getElementById('feedback-msg');
            const feedbackExp = document.getElementById('feedback-explanation');
            
            // 顯示正確答案的按鈕樣式
            allBtns[correct].classList.add('correct');

            if (selected === correct) {
                playSound('correct');
                feedbackMsg.innerText = "🎉 答對了！";
                feedbackMsg.className = "text-xl font-bold mb-2 text-green-600";
            } else {
                playSound('wrong');
                btnElement.classList.add('wrong');
                feedbackMsg.innerText = "❌ 答錯了！";
                feedbackMsg.className = "text-xl font-bold mb-2 text-red-600";
                
                // 扣除愛心
                lives--;
                updateHeartsUI();
            }

            // 填入解說
            feedbackExp.innerText = explanation;
            
            // 處理繼續按鈕的邏輯
            if (lives <= 0) {
                nextActionBtn.innerText = "遊戲結束";
                nextActionBtn.onclick = () => {
                    quizModal.classList.remove('active');
                    gameOverModal.classList.add('active');
                };
            } else {
                if (currentQuestionIndex === 0) {
                    nextActionBtn.innerText = "下一題";
                    nextActionBtn.onclick = () => showQuestion(currentStep, 1);
                } else {
                    if (currentStep === locations.length - 1) {
                        nextActionBtn.innerText = "完成旅程";
                        nextActionBtn.onclick = () => {
                            quizModal.classList.remove('active');
                            showEnding();
                        };
                    } else {
                        nextActionBtn.innerText = "繼續前進";
                        nextActionBtn.onclick = () => {
                            quizModal.classList.remove('active');
                            nextStep();
                        };
                    }
                }
            }

            // 顯示解說區塊
            feedbackArea.classList.remove('hidden');
        }

        function nextStep() {
            if (currentStep < locations.length - 1) {
                currentStep++;
                updateHeroPosition(currentStep);
            }
        }

        function showEnding() {
            endModal.classList.add('active');
            createConfetti();
        }

        // 控制音樂開關
        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicToggleBtn.innerText = "🔇";
            } else {
                bgMusic.play();
                musicToggleBtn.innerText = "🎵";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function resetGame() {
            currentStep = 0;
            currentQuestionIndex = 0;
            lives = 3;
            updateHeartsUI();
            
            // 停止並重置背景音樂與控制按鈕
            bgMusic.pause();
            bgMusic.currentTime = 0;
            isMusicPlaying = false;
            musicToggleBtn.innerText = "🔇";
            
            // 重置影片時間與狀態
            introVideo.pause();
            introVideo.currentTime = 0;
            
            endModal.classList.remove('active');
            gameOverModal.classList.remove('active');
            quizModal.classList.remove('active');
            
            updateHeroPosition(0, true);
            
            // 重置後顯示影片畫面，嘗試自動播放
            videoOverlay.classList.add('active');
            startModal.classList.remove('active');
            const playPromise = introVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    playVideoBtnOverlay.classList.remove('hidden');
                });
            }
        }

        // 簡單的慶祝特效
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // 啟動
        window.onload = initGame;

    </script>
</body>
</html>
